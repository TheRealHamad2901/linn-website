<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Linn.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Birthstone&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              arabic: ['Amiri', 'serif'],
              signature: ['Birthstone', 'cursive'],
            }
          }
        }
      }
    </script>
    <style>
      /* Removed opacity: 0 to ensure visibility */
      body { background-color: #FCFAF7; margin: 0; padding: 0; color: #1A1A1A; }
      .font-arabic { font-family: 'Amiri', serif; }
      .font-serif { font-family: 'Playfair Display', serif; }
      .font-signature { font-family: 'Birthstone', cursive; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #E5B7A1; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
